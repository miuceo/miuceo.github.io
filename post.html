<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — Muhammadjon Ibrohimov</title>
<link rel="icon" href="favicon.ico">
<style>
:root{--bg:#faf8f4;--bg2:#f2ede4;--bg3:#e8e1d4;--text:#1a1714;--text2:#6b6255;--text3:#a8998a;--border:rgba(26,23,20,0.08);--accent:#c8622a;--accent2:#e8854a;--acbg:#fdf3ec;--green:#4caf7d;--red:#e05555;--nav-bg:rgba(250,248,244,0.88);--r:12px;--sans:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'SF Mono',ui-monospace,'Cascadia Code',monospace;--ease:cubic-bezier(0.22,1,0.36,1);}
[data-theme="dark"]{--bg:#13110e;--bg2:#1c1916;--bg3:#252118;--text:#f0ebe3;--text2:#9a9082;--text3:#5a5248;--border:rgba(240,235,227,0.08);--accent:#e8854a;--accent2:#f0a070;--acbg:#1f1610;--nav-bg:rgba(19,17,14,0.85);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1.25rem,5vw,3rem);height:60px;background:var(--nav-bg);backdrop-filter:blur(16px) saturate(1.4);border-bottom:1px solid var(--border);}
.nav-logo{font-size:16px;font-weight:600;color:var(--text);text-decoration:none;font-family:var(--mono);}
.nav-logo span{color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:.5rem;}
.nav-back{font-size:13px;color:var(--text2);text-decoration:none;padding:5px 12px;border-radius:7px;display:flex;align-items:center;gap:5px;transition:color .15s,background .15s;border:1px solid var(--border);}
.nav-back:hover{color:var(--text);background:var(--bg2);}
.theme-btn{background:var(--bg2);border:1px solid var(--border);cursor:pointer;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s,transform .15s;}
.theme-btn:hover{background:var(--bg3);transform:rotate(15deg);}

/* POST CONTENT */
.post-wrap{max-width:680px;margin:0 auto;padding:7.5rem clamp(1.25rem,5vw,3rem) 4rem;}
.post-meta-top{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.25rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;}
.post-date::after{content:'·';margin-left:.5rem;color:var(--border);}
.post-author{color:var(--accent);}
.post-title{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;letter-spacing:-.03em;line-height:1.15;margin-bottom:1.5rem;}
.post-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2rem;}
.post-tag{font-size:11px;font-family:var(--mono);background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:3px 10px;color:var(--text2);}

/* IMAGE SLIDER */
.post-slider{position:relative;width:100%;border-radius:var(--r);overflow:hidden;margin-bottom:2.5rem;background:var(--bg3);}
.post-slider img{width:100%;display:block;opacity:0;position:absolute;top:0;left:0;height:100%;object-fit:cover;transition:opacity .4s ease;}
.post-slider img.active{opacity:1;position:relative;}
.post-slider img:only-child{position:relative;opacity:1;}
.slider-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:2;}
.slider-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:background .2s;}
.slider-dot.active{background:#fff;}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.4);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity .2s;}
.post-slider:hover .slider-btn{opacity:1;}
.post-slider-btn-prev{left:10px;}.post-slider-btn-next{right:10px;}

/* BODY */
.post-body{font-size:16px;line-height:1.85;color:var(--text);}
.post-body h1,.post-body h2,.post-body h3{font-weight:700;letter-spacing:-.02em;margin:2rem 0 .75rem;line-height:1.25;}
.post-body h1{font-size:1.8rem;}
.post-body h2{font-size:1.4rem;}
.post-body h3{font-size:1.15rem;}
.post-body p{margin-bottom:1.25rem;}
.post-body ul,.post-body ol{padding-left:1.5rem;margin-bottom:1.25rem;}
.post-body li{margin-bottom:.35rem;}
.post-body blockquote{border-left:3px solid var(--accent);padding:.25rem 0 .25rem 1.25rem;color:var(--text2);font-style:italic;margin:1.5rem 0;}
.post-body code{font-family:var(--mono);background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:.875em;color:var(--text);}
.post-body pre{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;overflow-x:auto;margin:1.5rem 0;}
.post-body pre code{background:none;border:none;padding:0;font-size:.875rem;}
.post-body img{max-width:100%;border-radius:var(--r);margin:1rem 0;}
.post-body a{color:var(--accent);text-decoration:underline;}
.post-body strong{font-weight:700;}
.post-body em{font-style:italic;}
.post-body hr{border:none;border-top:1px solid var(--border);margin:2rem 0;}

/* SHARE ROW */
.post-share{display:flex;align-items:center;gap:.75rem;margin:2.5rem 0;padding:1.25rem 1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);flex-wrap:wrap;}
.share-label{font-size:12px;font-family:var(--mono);color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-right:.25rem;}
.share-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:500;padding:6px 14px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text2);cursor:pointer;text-decoration:none;transition:all .15s;}
.share-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--acbg);}
.share-btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.share-btn-primary:hover{background:var(--accent2);}

/* COMMENTS */
.comments-section{margin-top:2.5rem;}
.comments-title{font-size:1.1rem;font-weight:700;margin-bottom:1.25rem;letter-spacing:-.02em;}
.comment-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:.75rem;animation:fadeIn .3s ease;}
.comment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;flex-wrap:wrap;gap:.5rem;}
.comment-user{font-size:13px;font-weight:600;}
.comment-date{font-size:11px;font-family:var(--mono);color:var(--text3);}
.comment-body{font-size:14px;color:var(--text2);line-height:1.65;}
.comment-actions{margin-top:.6rem;display:flex;gap:.5rem;}
.btn-translate{font-size:11px;font-family:var(--mono);background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 9px;cursor:pointer;color:var(--text2);transition:all .15s;}
.btn-translate:hover{border-color:var(--accent);color:var(--accent);}
.comment-translated{margin-top:.5rem;font-size:13px;color:var(--text2);background:var(--bg3);border-left:3px solid var(--accent);padding:.5rem .75rem;border-radius:0 6px 6px 0;display:none;}
.comment-translated.show{display:block;}
.comment-form{margin-top:1.5rem;}
.comment-form-title{font-size:13px;font-family:var(--mono);color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.75rem;}
.comment-inputs{display:flex;flex-direction:column;gap:.75rem;}
.form-input{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:14px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,98,42,.12);}
textarea.form-input{min-height:100px;resize:vertical;line-height:1.6;}
.btn-submit{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:background .15s,transform .15s;}
.btn-submit:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.no-comments{font-size:14px;color:var(--text2);padding:1rem 0;}

/* TOAST */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all .25s var(--ease);pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.success{background:var(--green);}
#toast.error{background:var(--red);}

/* LOADING */
.post-loading{padding:4rem 0;text-align:center;color:var(--text3);font-family:var(--mono);font-size:12px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}

footer{border-top:1px solid var(--border);padding:1.75rem clamp(1.25rem,5vw,3rem);max-width:680px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem;font-family:var(--mono);font-size:11px;color:var(--text3);}
footer a{color:var(--text3);text-decoration:none;}footer a:hover{color:var(--accent);}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">miuceo<span>./</span></a>
  <div class="nav-right">
    <a href="index.html" class="nav-back">← Portfolio</a>
    <a href="blog.html" class="nav-back">Blog</a>
    <button class="theme-btn" id="themeBtn">🌙</button>
  </div>
</nav>
<div id="toast"></div>
<div class="post-wrap">
  <div id="postContent"><div class="post-loading"><span class="spinner"></span>Loading post...</div></div>
</div>
<footer>
  <span>© 2025 Muhammadjon Ibrohimov</span>
  <span><a href="index.html">Portfolio</a> · <a href="blog.html">Blog</a></span>
</footer>

<script>
const GITHUB_REPO  = 'miuceo/miuceo.github.io';
const GITHUB_TOKEN = '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';
const GEMINI_KEY   = 'AQ.Ab8RN6I7h07fsuID3SWd8QzyOudjH3pZdrWsActExbDbDdt0Ug';
// Model fallback chain: try each in order
const GEMINI_MODELS = ['gemini-2.5-flash','gemini-2.5-flash-lite'];

// Theme
const themeBtn=document.getElementById('themeBtn');
function applyTheme(d){document.documentElement.setAttribute('data-theme',d?'dark':'light');themeBtn.textContent=d?'☀️':'🌙';localStorage.setItem('mi_theme',d?'dark':'light');}
applyTheme(localStorage.getItem('mi_theme')?localStorage.getItem('mi_theme')==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches);
themeBtn.addEventListener('click',()=>applyTheme(document.documentElement.getAttribute('data-theme')!=='dark'));

// Toast
let toastT;
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+(type||'');clearTimeout(toastT);toastT=setTimeout(()=>el.className='',3200);}

// Gemini with exponential backoff + model fallback
async function callGemini(prompt){
  for(const model of GEMINI_MODELS){
    for(let attempt=0;attempt<3;attempt++){
      try{
        const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_KEY}`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:512,temperature:0.5}})
        });
        if(res.status===429||res.status===503){
          // exponential backoff: 2s, 4s, 8s
          const wait=(Math.pow(2,attempt+1)+Math.random())*1000;
          await new Promise(r=>setTimeout(r,wait));
          if(attempt===2) break; // try next model
          continue;
        }
        if(res.status===400){throw new Error('Bad request');}
        if(!res.ok){throw new Error('API error '+res.status);}
        const data=await res.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text||'';
      }catch(e){
        if(attempt===2) break;
        await new Promise(r=>setTimeout(r,2000));
      }
    }
  }
  throw new Error('All Gemini models unavailable. Try again later.');
}

// Parse helpers
function parseImages(body){const imgs=[];const re=/!\[.*?\]\((https?:\/\/[^\)]+)\)/g;let m;while((m=re.exec(body))!==null)imgs.push(m[1]);return imgs;}
function parseBody(body){
  return (body||'')
    .replace(/\*\*Author:\*\*.*?\n/g,'').replace(/\*\*Date:\*\*.*?\n/g,'').replace(/\*\*Tags:\*\*.*?\n/g,'')
    .replace(/!\[.*?\]\(https?:\/\/[^\)]+\)/g,'')
    .trim();
}
function mdToHtml(md){
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\[(.+?)\]\((https?:\/\/.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\* (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<[hublpor])/gm,'')
    ;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Slider
const sliderState={};
function makePostSlider(imgs){
  if(!imgs.length)return '';
  if(imgs.length===1)return `<div class="post-slider"><img src="${imgs[0]}" alt="" loading="lazy"></div>`;
  const imgHtml=imgs.map((u,i)=>`<img src="${u}" class="${i===0?'active':''}" alt="" loading="lazy">`).join('');
  const dotHtml=imgs.map((_,i)=>`<span class="slider-dot${i===0?' active':''}" onclick="slideTo(event,'post',${i})"></span>`).join('');
  return `<div class="post-slider" id="slider-post">${imgHtml}
    <button class="slider-btn post-slider-btn-prev" onclick="slideStep(event,'post',-1)">‹</button>
    <button class="slider-btn post-slider-btn-next" onclick="slideStep(event,'post',1)">›</button>
    <div class="slider-dots">${dotHtml}</div></div>`;
}
function slideTo(e,id,idx){e.preventDefault();e.stopPropagation();const el=document.getElementById('slider-'+id);if(!el)return;const imgs=el.querySelectorAll('img'),dots=el.querySelectorAll('.slider-dot');sliderState[id]=idx;imgs.forEach((img,i)=>img.classList.toggle('active',i===idx));dots.forEach((d,i)=>d.classList.toggle('active',i===idx));}
function slideStep(e,id,dir){e.preventDefault();e.stopPropagation();const el=document.getElementById('slider-'+id);if(!el)return;const total=el.querySelectorAll('img').length;const cur=sliderState[id]||0;slideTo(e,id,(cur+dir+total)%total);}

// Share
function sharePost(title,url){if(navigator.share){navigator.share({title,url});}else{navigator.clipboard.writeText(url);toast('Link copied!','success');}}
function shareTelegram(title,url){window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(title)}`,'_blank');}
function shareTwitter(title,url){window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`,'_blank');}

// Translate comment
async function translateComment(commentId,text,btn){
  const transEl=document.getElementById('trans-'+commentId);
  if(transEl.classList.contains('show')){transEl.classList.remove('show');btn.textContent='🌐 Translate';return;}
  btn.textContent='⏳ Translating...';btn.disabled=true;
  try{
    const result=await callGemini(`Translate the following comment to English. Return ONLY the translation, nothing else:\n\n${text}`);
    transEl.textContent=result;transEl.classList.add('show');
    btn.textContent='🌐 Hide';
  }catch(e){toast('Translation failed: '+e.message,'error');btn.textContent='🌐 Translate';}
  btn.disabled=false;
}

// Load post
const issueId=new URLSearchParams(location.search).get('id');

async function loadPost(){
  if(!issueId){document.getElementById('postContent').innerHTML='<div class="post-loading">No post ID specified.</div>';return;}
  try{
    const [issueRes,commentsRes]=await Promise.all([
      fetch(`https://api.github.com/repos/${GITHUB_REPO}/issues/${issueId}`,{headers:{'Accept':'application/vnd.github+json'}}),
      fetch(`https://api.github.com/repos/${GITHUB_REPO}/issues/${issueId}/comments?per_page=100`,{headers:{'Accept':'application/vnd.github+json'}})
    ]);
    const issue=await issueRes.json();
    const comments=await commentsRes.json();
    if(!issue||issue.message==='Not Found'){document.getElementById('postContent').innerHTML='<div class="post-loading">Post not found.</div>';return;}

    document.title=issue.title+' — Muhammadjon Ibrohimov';
    const imgs=parseImages(issue.body||'');
    const bodyMd=parseBody(issue.body||'');
    const bodyHtml=mdToHtml(bodyMd);
    const date=new Date(issue.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    const postTags=(issue.labels||[]).filter(l=>l.name!=='blog').map(l=>l.name);
    const postUrl=`${location.origin}/post.html?id=${issueId}`;

    // Comments html
    const commentsHtml=(Array.isArray(comments)&&comments.length)
      ? comments.map(c=>{
          const cDate=new Date(c.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
          return `<div class="comment-item">
            <div class="comment-header">
              <span class="comment-user">${esc(c.user.login)}</span>
              <span class="comment-date">${cDate}</span>
            </div>
            <div class="comment-body" id="cbody-${c.id}">${esc(c.body)}</div>
            <div class="comment-actions">
              <button class="btn-translate" id="tbtn-${c.id}" onclick="translateComment(${c.id},document.getElementById('cbody-${c.id}').textContent,this)">🌐 Translate to EN</button>
            </div>
            <div class="comment-translated" id="trans-${c.id}"></div>
          </div>`;
        }).join('')
      : '<div class="no-comments">No comments yet. Be the first!</div>';

    document.getElementById('postContent').innerHTML=`
      <div class="post-meta-top">
        <span class="post-date">${date}</span>
        <span class="post-author">Muhammadjon Ibrohimov</span>
      </div>
      <h1 class="post-title">${esc(issue.title)}</h1>
      ${postTags.length?`<div class="post-tags">${postTags.map(t=>`<span class="post-tag">${esc(t)}</span>`).join('')}</div>`:''}
      ${makePostSlider(imgs)}
      <div class="post-body">${bodyHtml}</div>

      <!-- SHARE -->
      <div class="post-share">
        <span class="share-label">Share</span>
        <button class="share-btn share-btn-primary" onclick="sharePost('${esc(issue.title)}','${postUrl}')">🔗 Copy link</button>
        <button class="share-btn" onclick="shareTelegram('${esc(issue.title)}','${postUrl}')">✈️ Telegram</button>
        <button class="share-btn" onclick="shareTwitter('${esc(issue.title)}','${postUrl}')">🐦 Twitter/X</button>
      </div>

      <!-- COMMENTS -->
      <div class="comments-section">
        <div class="comments-title">Comments (${Array.isArray(comments)?comments.length:0})</div>
        <div id="commentsList">${commentsHtml}</div>

        <!-- Comment form -->
        <div class="comment-form">
          <div class="comment-form-title">Leave a comment</div>
          <div class="comment-inputs">
            <input class="form-input" id="commentName" placeholder="Your name (optional)">
            <textarea class="form-input" id="commentText" placeholder="Write your comment..."></textarea>
            <div>
              <button class="btn-submit" id="submitCommentBtn" onclick="submitComment()">Post comment →</button>
            </div>
          </div>
        </div>
      </div>`;
  }catch(e){document.getElementById('postContent').innerHTML=`<div class="post-loading">Error loading post: ${e.message}</div>`;}
}

// Submit comment via GitHub API
async function submitComment(){
  const name=document.getElementById('commentName').value.trim();
  const text=document.getElementById('commentText').value.trim();
  if(!text){toast('Please write a comment first','error');return;}
  const btn=document.getElementById('submitCommentBtn');
  btn.innerHTML='<span class="spinner"></span>Posting...';btn.disabled=true;
  const body=name?`**${name}**\n\n${text}`:text;
  try{
    const res=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/issues/${issueId}/comments`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${GITHUB_TOKEN}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({body})
    });
    if(!res.ok)throw new Error('GitHub API error '+res.status);
    toast('Comment posted! ✦','success');
    document.getElementById('commentName').value='';
    document.getElementById('commentText').value='';
    // reload comments
    setTimeout(loadPost,1000);
  }catch(e){toast('Error: '+e.message,'error');}
  finally{btn.innerHTML='Post comment →';btn.disabled=false;}
}

loadPost();
</script>
</body>
</html>
