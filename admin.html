<!DOCTYPE html>
<html lang="uz">
<head>
<script>
(function(){
  try{
    const auth = JSON.parse(localStorage.getItem('miuceo_auth') || 'null');
    if(!auth || !auth.ok || Date.now() > auth.expires){
      window.location.replace('index.html');
    }
  }catch(e){
    window.location.replace('index.html');
  }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin panel — miuceo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F5F1EA; --cream-2:#EEE9DF; --cream-3:#E7E1D3; --ink:#1F1B16; --ink-soft:#4A443C;
    --clay:#D97757; --clay-dark:#B85C3F; --line:#DDD5C7; --white:#FFFFFF; --danger:#B23A2E;
    --serif:'Newsreader', Georgia, serif; --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono:'IBM Plex Mono', monospace;
  }
  [data-theme="dark"]{
    --cream:#1A1714; --cream-2:#242019; --cream-3:#2C2620;
    --ink:#F0EAE0; --ink-soft:#B8AF9E; --line:#3A342B; --white:#242019;
  }
  body{ transition:background .2s, color .2s; }
  .theme-toggle{ background:none; border:1px solid var(--line); border-radius:20px; padding:8px 14px; font-size:13px; cursor:pointer; color:var(--ink); font-family:var(--sans); }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--cream); color:var(--ink); font-family:var(--sans); line-height:1.5; }
  a{ text-decoration:none; color:inherit; }
  .wrap{ max-width:1000px; margin:0 auto; padding:0 32px 100px; }

  .navbar{ display:flex; justify-content:space-between; align-items:center; padding:22px 0; border-bottom:1px solid var(--line); margin-bottom:40px; }
  .brand{ font-family:var(--sans); font-weight:800; font-size:20px; letter-spacing:-0.01em; }
  .back-link{ font-family:var(--mono); font-size:13px; color:var(--ink-soft); }
  .back-link:hover{ color:var(--clay); }

  .page-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
  .page-header h1{ font-family:var(--sans); font-weight:800; font-size:34px; margin:0; }
  .btn{ font-family:var(--sans); font-size:14px; font-weight:600; padding:11px 22px; border-radius:6px; border:1px solid var(--ink); background:var(--ink); color:var(--cream); cursor:pointer; }
  .btn:hover{ background:var(--clay-dark); border-color:var(--clay-dark); }
  .btn.ghost{ background:transparent; color:var(--ink); }
  .btn.ghost:hover{ background:var(--ink); color:var(--cream); }
  .btn.danger{ background:var(--danger); border-color:var(--danger); }
  .btn.danger:hover{ background:#8f2c22; border-color:#8f2c22; }
  .btn.small{ padding:8px 14px; font-size:13px; }

  details.settings{ background:var(--white); border:1px solid var(--line); border-radius:8px; padding:16px 20px; margin-bottom:28px; }
  details.settings summary{ font-family:var(--mono); font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-soft); cursor:pointer; }
  .settings-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:16px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-family:var(--mono); font-size:11px; color:var(--ink-soft); }
  .field input{ font-family:var(--mono); font-size:13px; padding:9px 12px; border:1px solid var(--line); border-radius:6px; background:var(--cream-2); }
  .field input:focus{ outline:none; border-color:var(--clay); }

  .post-row{ background:var(--white); border:1px solid var(--line); border-radius:10px; padding:20px 24px; display:flex; justify-content:space-between; align-items:center; gap:20px; margin-bottom:14px; }
  .post-info h3{ font-family:var(--serif); font-size:20px; font-weight:500; margin:0 0 6px; }
  .post-info .meta{ font-family:var(--mono); font-size:12px; color:var(--ink-soft); }
  .post-actions{ display:flex; gap:8px; flex-shrink:0; }
  .empty-state{ text-align:center; padding:60px 20px; color:var(--ink-soft); font-family:var(--serif); font-style:italic; font-size:17px; }

  #confirmModal{ display:none; position:fixed; inset:0; background:rgba(31,27,22,0.5); align-items:center; justify-content:center; z-index:100; }
  #confirmModal .box{ background:var(--white); border-radius:10px; padding:28px; width:min(440px, 90vw); }
  #confirmModal p{ font-size:15px; margin:0 0 20px; }
  #confirmModal .row{ display:flex; gap:10px; justify-content:flex-end; }

  #logModal{ display:none; position:fixed; inset:0; background:rgba(31,27,22,0.5); align-items:center; justify-content:center; z-index:100; }
  #logModal .box{ background:var(--white); border-radius:10px; padding:24px; width:min(600px, 90vw); }
  #logModal .log{ font-family:var(--mono); font-size:12px; background:var(--cream-2); border-radius:6px; padding:12px; max-height:200px; overflow-y:auto; white-space:pre-wrap; margin-bottom:14px; }

  @media (max-width:640px){
    .wrap{ padding:0 18px 60px; }
    .navbar{ flex-wrap:wrap; gap:10px; }
    .page-header{ flex-wrap:wrap; gap:14px; }
    .page-header h1{ font-size:26px; }
    .settings-grid{ grid-template-columns:1fr; }
    .post-row{ flex-direction:column; align-items:flex-start; gap:14px; }
    .post-actions{ flex-wrap:wrap; }
  }
</style>
</head>
<body>

<div class="wrap">
  <nav class="navbar">
    <span class="brand">MIUCEO\</span>
    <div style="display:flex; gap:16px; align-items:center;">
      <button class="theme-toggle" id="themeToggle">🌙</button>
      <button class="btn ghost small" id="logoutBtn">Chiqish</button>
      <a href="index.html" class="back-link">← Bosh sahifaga</a>
    </div>
  </nav>

  <details class="settings">
    <summary>Sozlamalar (GitHub &amp; Telegram)</summary>
    <div class="settings-grid">
      <div class="field"><label>GitHub Personal Access Token</label><input type="password" id="ghToken" placeholder="ghp_..."></div>
      <div class="field"><label>GitHub Owner</label><input type="text" id="ghOwner" placeholder="miuceo"></div>
      <div class="field"><label>GitHub Repo</label><input type="text" id="ghRepo" placeholder="miuceo.github.io"></div>
      <div class="field"><label>Branch</label><input type="text" id="ghBranch" placeholder="main"></div>
      <div class="field"><label>Telegram Bot Token</label><input type="password" id="tgToken" placeholder="123456:ABC-..."></div>
      <div class="field"><label>Telegram Kanal (@username)</label><input type="text" id="tgChannel" placeholder="@muhammadibrohimov_ceo"></div>
    </div>
    <div style="margin-top:14px;"><button class="btn small" id="saveSettingsBtn">Saqlash</button></div>
  </details>

  <div class="page-header">
    <h1>Postlar</h1>
    <div style="display:flex; gap:10px;">
      <button class="btn ghost" id="refreshBtn">Yangilash</button>
      <a href="post-builder.html" class="btn">+ Yangi post</a>
    </div>
  </div>

  <div id="postsList">
    <div class="empty-state">Yuklanmoqda...</div>
  </div>
</div>

<div id="confirmModal">
  <div class="box">
    <p id="confirmText">Rostdan ham o'chirmoqchimisiz?</p>
    <div class="row">
      <button class="btn ghost small" id="cancelDeleteBtn">Bekor qilish</button>
      <button class="btn danger small" id="confirmDeleteBtn">Ha, o'chirish</button>
    </div>
  </div>
</div>

<div id="logModal">
  <div class="box">
    <div class="log" id="processLog"></div>
    <button class="btn ghost small" id="closeLogBtn">Yopish</button>
  </div>
</div>

<script>
let posts = [];
let slugToDelete = null;

function initTheme(){
  const saved = localStorage.getItem('miuceo_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').textContent = saved === 'dark' ? '☀️' : '🌙';
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('miuceo_theme', next);
  initTheme();
});
initTheme();

function loadSettings(){
  try{
    const s = JSON.parse(localStorage.getItem('pb_settings') || '{}');
    document.getElementById('ghToken').value = s.ghToken || '';
    document.getElementById('ghOwner').value = s.ghOwner || '';
    document.getElementById('ghRepo').value = s.ghRepo || '';
    document.getElementById('ghBranch').value = s.ghBranch || 'main';
    document.getElementById('tgToken').value = s.tgToken || '';
    document.getElementById('tgChannel').value = s.tgChannel || '';
  }catch(e){}
}
function getSettings(){
  const existing = JSON.parse(localStorage.getItem('pb_settings') || '{}');
  return {
    ...existing,
    ghToken: document.getElementById('ghToken').value.trim(),
    ghOwner: document.getElementById('ghOwner').value.trim(),
    ghRepo: document.getElementById('ghRepo').value.trim(),
    ghBranch: document.getElementById('ghBranch').value.trim() || 'main',
    tgToken: document.getElementById('tgToken').value.trim(),
    tgChannel: document.getElementById('tgChannel').value.trim(),
  };
}
document.getElementById('saveSettingsBtn').addEventListener('click', () => {
  localStorage.setItem('pb_settings', JSON.stringify(getSettings()));
  alert('Sozlamalar saqlandi.');
});
loadSettings();

function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(iso){
  if(!iso) return '';
  return new Date(iso).toLocaleDateString('uz-UZ', { year:'numeric', month:'long', day:'numeric' });
}

async function ghGetFile(path){
  const s = getSettings();
  const res = await fetch(`https://api.github.com/repos/${s.ghOwner}/${s.ghRepo}/contents/${path}?ref=${s.ghBranch}`, {
    headers: { Authorization: `token ${s.ghToken}`, Accept: 'application/vnd.github+json' }
  });
  if(res.status === 404) return null;
  if(!res.ok) throw new Error(`GitHub GET ${path} xato: ${res.status}`);
  const data = await res.json();
  return { sha: data.sha, content: decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))) };
}
async function ghPutFile(path, contentStr, message, sha){
  const s = getSettings();
  const body = { message, content: btoa(unescape(encodeURIComponent(contentStr))), branch: s.ghBranch };
  if(sha) body.sha = sha;
  const res = await fetch(`https://api.github.com/repos/${s.ghOwner}/${s.ghRepo}/contents/${path}`, {
    method:'PUT',
    headers: { Authorization:`token ${s.ghToken}`, Accept:'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if(!res.ok){ const t = await res.text(); throw new Error(`GitHub PUT ${path} xato: ${res.status} ${t}`); }
  return res.json();
}
async function ghDeleteFile(path, message, sha){
  const s = getSettings();
  const res = await fetch(`https://api.github.com/repos/${s.ghOwner}/${s.ghRepo}/contents/${path}`, {
    method:'DELETE',
    headers: { Authorization:`token ${s.ghToken}`, Accept:'application/vnd.github+json', 'Content-Type':'application/json' },
    body: JSON.stringify({ message, sha, branch: s.ghBranch })
  });
  if(!res.ok && res.status !== 404){ const t = await res.text(); throw new Error(`GitHub DELETE ${path} xato: ${res.status} ${t}`); }
}
async function tgDeleteMessage(messageId){
  const s = getSettings();
  if(!s.tgToken || !s.tgChannel || !messageId) return;
  await fetch(`https://api.telegram.org/bot${s.tgToken}/deleteMessage`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ chat_id: s.tgChannel, message_id: messageId })
  });
}

async function loadPosts(){
  const listEl = document.getElementById('postsList');
  listEl.innerHTML = '<div class="empty-state">Yuklanmoqda...</div>';
  try{
    const s = getSettings();
    if(!s.ghToken || !s.ghOwner || !s.ghRepo){
      listEl.innerHTML = '<div class="empty-state">Iltimos, avval Sozlamalar bo\'limini to\'ldiring.</div>';
      return;
    }
    const file = await ghGetFile('posts.json');
    posts = file ? JSON.parse(file.content) : [];
    posts.sort((a,b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at));
    renderPosts();
  }catch(err){
    listEl.innerHTML = `<div class="empty-state">Xatolik: ${escapeHtml(err.message)}</div>`;
  }
}

function renderPosts(){
  const listEl = document.getElementById('postsList');
  if(posts.length === 0){
    listEl.innerHTML = '<div class="empty-state">Hali post yo\'q. "+ Yangi post" tugmasini bosing.</div>';
    return;
  }
  listEl.innerHTML = posts.map(p => `
    <div class="post-row">
      <div class="post-info">
        <h3>${escapeHtml(p.title)}</h3>
        <div class="meta">Yaratildi: ${formatDate(p.created_at)} · Yangilandi: ${formatDate(p.updated_at)}</div>
      </div>
      <div class="post-actions">
        <a href="post-builder.html?edit=${encodeURIComponent(p.slug)}" class="btn ghost small">Tahrirlash</a>
        <a href="posts/${p.slug}.html" target="_blank" class="btn ghost small">Ko'rish</a>
        <button class="btn danger small" data-slug="${p.slug}" data-title="${escapeHtml(p.title)}">O'chirish</button>
      </div>
    </div>
  `).join('');

  listEl.querySelectorAll('button.danger').forEach(btn => {
    btn.addEventListener('click', () => {
      slugToDelete = btn.getAttribute('data-slug');
      document.getElementById('confirmText').textContent = `"${btn.getAttribute('data-title')}" postini butunlay o'chirmoqchimisiz? Bu amalni orqaga qaytarib bo'lmaydi.`;
      document.getElementById('confirmModal').style.display = 'flex';
    });
  });
}

document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
  document.getElementById('confirmModal').style.display = 'none';
  slugToDelete = null;
});

document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
  document.getElementById('confirmModal').style.display = 'none';
  if(!slugToDelete) return;
  const slug = slugToDelete;
  const post = posts.find(p => p.slug === slug);

  document.getElementById('processLog').textContent = '';
  document.getElementById('logModal').style.display = 'flex';
  const log = (m) => { document.getElementById('processLog').textContent += m + '\n'; };

  try{
    log(`"${post.title}" o'chirilmoqda...`);

    const postFile = await ghGetFile(`posts/${slug}.html`);
    if(postFile){ await ghDeleteFile(`posts/${slug}.html`, `Delete post: ${post.title}`, postFile.sha); log('✓ posts/' + slug + '.html o\'chirildi'); }

    const dataFile = await ghGetFile(`posts-data/${slug}.json`);
    if(dataFile){ await ghDeleteFile(`posts-data/${slug}.json`, `Delete post data: ${post.title}`, dataFile.sha); log('✓ posts-data/' + slug + '.json o\'chirildi'); }

    const indexFile = await ghGetFile('posts.json');
    let index = indexFile ? JSON.parse(indexFile.content) : [];
    index = index.filter(p => p.slug !== slug);
    await ghPutFile('posts.json', JSON.stringify(index, null, 2), `Remove post from index: ${post.title}`, indexFile.sha);
    log('✓ posts.json yangilandi');

    if(post.telegram_message_id){
      await tgDeleteMessage(post.telegram_message_id);
      log('✓ Telegram xabari o\'chirildi');
    }

    log('');
    log('Tayyor!');
    posts = posts.filter(p => p.slug !== slug);
    renderPosts();
  }catch(err){
    log('✗ Xatolik: ' + err.message);
  }
  slugToDelete = null;
});

document.getElementById('closeLogBtn').addEventListener('click', () => {
  document.getElementById('logModal').style.display = 'none';
});
document.getElementById('refreshBtn').addEventListener('click', loadPosts);
document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('miuceo_auth');
  window.location.href = 'index.html';
});

loadPosts();
</script>
</body>
</html>
